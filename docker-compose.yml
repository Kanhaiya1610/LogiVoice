version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # Persistent storage for history and uploaded files
      - ./backend/history.json:/app/history.json
      - backend_uploads:/app/uploads
      - backend_static:/app/static/pdf_pages
    env_file:
      - ./backend/.env
    environment:
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-logivoice-docs}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_static:
